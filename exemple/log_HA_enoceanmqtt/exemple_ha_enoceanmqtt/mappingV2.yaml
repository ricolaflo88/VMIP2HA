# Below are mappings common to all EEPs
common:
   rssi:
      - component: "sensor"
        name: "rssi"
        config:
           state_topic: ""
           value_template: "{{ value_json._RSSI_ }}"
           unit_of_measurement: "dBm"
           device_class: "signal_strength"
           state_class: "measurement"
           entity_category: "diagnostic"
   date:
      - component: "sensor"
        name: "last_seen"
        config:
           state_topic: ""
           value_template: >-
             {{ value_json._DATE_|regex_replace(find='\..*$', replace='')|as_datetime()|as_local() }}
           device_class: "timestamp"
           entity_category: "diagnostic"

# Mapping for system purpose (HA <-> enoceanmqtt configurations)
system:
   delete:
      - system: "True"
        component: "button"
        name: "delete"
        config:
           command_topic: "__system"
           payload_press: "delete"
           icon: "mdi:delete"
           entity_category: "config"
   learn:
      - system: "True"
        component: "switch"
        name: "ENOCEAN_LEARN"
        config:
           state_topic: "learn"
           command_topic: "learn/req"
           icon: "mdi:home-plus"
           entity_category: "config"
