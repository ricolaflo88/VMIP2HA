# Mapping of EEPs to Home Assistant Entities
0xD2:
  0x01:
    0x12: &D20112
      device_config:
        command: "CMD"
        channel: "IO/CMD"
        log_learn: ""
        direction: ""
        answer: ""
      entities:
      - component: "light"
        name: "IO0"
        config:
          schema: "template"
          state_topic: "IO0/CMD4"
          state_template: >-
            {% if value_json.OV == 0 %}off{% else %}on{% endif %}
          command_topic: "req"
          command_on_template: >-
            {"CMD":"1","DV":"0","IO":"0","OV":"100","send":"clear"}
          command_off_template: >-
            {"CMD":"1","DV":"0","IO":"0","OV":"0","send":"clear"}
      - component: "button"
        name: "query_status_IO0"
        config:
          command_topic: "req"
          payload_press: >-
            {"CMD":"3","IO":"0","send":"clear"}
      - component: binary_sensor
        name: "IO0_LC"
        config:
          state_topic: "IO0/CMD4"
          payload_on: "on"
          payload_off: "off"
          value_template: >-
            {% if value_json.LC == 1 %}on{% else %}off{% endif %}
      - component: "light"
        name: "IO1"
        config:
          schema: "template"
          state_topic: "IO1/CMD4"
          state_template: >-
            {% if value_json.OV == 0 %}off{% else %}on{% endif %}
          command_topic: "req"
          command_on_template: >-
            {"CMD":"1","DV":"0","IO":"1","OV":"100","send":"clear"}
          command_off_template: >-
            {"CMD":"1","DV":"0","IO":"1","OV":"0","send":"clear"}
      - component: "button"
        name: "query_status_IO1"
        config:
          command_topic: "req"
          payload_press: >-
            {"CMD":"3","IO":"1","send":"clear"}
      - component: binary_sensor
        name: "IO1_LC"
        config:
          state_topic: "IO1/CMD4"
          payload_on: "on"
          payload_off: "off"
          value_template: >-
            {% if value_json.LC == 1 %}on{% else %}off{% endif %}
      - component: "button"
        name: "query_status_all"
        config:
          command_topic: "req"
          payload_press: >-
            {"CMD":"3","IO":"30","send":"clear"}
