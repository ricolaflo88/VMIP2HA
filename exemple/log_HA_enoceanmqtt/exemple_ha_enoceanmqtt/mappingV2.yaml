  0x01:
    0x00:
      device_config:
        command: "CMD"
        channel: "CMD"
        log_learn: "1"
        direction: "both"
        answer: ""
      entities:
        - component: "sensor" # === Command 0 : Données courantes ===
          name: "MF_mode"
          config:
            state_topic: "CMD0"
            value_template: "{{ value_json.MF }}"
        - component: "sensor"
          name: "bypass"
          config:
            state_topic: "CMD0"
            value_template: "{{ value_json.BYP }}"
        - component: "sensor"
          name: "plage_horaire"
          config:
            state_topic: "CMD0"
            value_template: "{{ value_json.PLH }}"
        - component: "sensor"
          name: "boost"
          config:
            state_topic: "CMD0"
            value_template: "{{ value_json.BOOS }}"
        - component: "sensor"
          name: "temperature_consigne_elec"
          config:
            state_topic: "CMD0"
            value_template: "{{ value_json.TEMPCELEC }}"
            unit_of_measurement: "°C"
        - component: "sensor" # === Command 1 : Données courantes complément 1 ===
          name: "debit_air_sortant"
          config:
            state_topic: "CMD1"
            value_template: "{{ value_json.DEBAS }}"
            unit_of_measurement: "m³/h"
        - component: "sensor"
          name: "puissance_chauffage"
          config:
            state_topic: "CMD1"
            value_template: "{{ value_json.PCHAUFF }}"
            unit_of_measurement: "%"
        - component: "sensor" # === Command 2 : Données courantes complément 2 ===
          name: "temperature_exterieure"
          config:
            state_topic: "CMD2"
            value_template: "{{ value_json.TEMPEXT }}"
            unit_of_measurement: "°C"
        - component: "sensor"
          name: "indice_filtre"
          config:
            state_topic: "CMD2"
            value_template: "{{ value_json.IEFIL }}"
            unit_of_measurement: "%"
        - component: "sensor" # === Command 3 : États de maintenance ===
          name: "test_global"
          config:
            state_topic: "CMD3"
            value_template: "{{ value_json.TGLOB }}"
        - component: "sensor"
          name: "code_err1"
          config:
            state_topic: "CMD3"
            value_template: "{{ value_json.CERR1 }}"
        - component: "sensor"
          name: "nb_semaines_depuis_maintenance"
          config:
            state_topic: "CMD3"
            value_template: "{{ value_json.NBSDMAINT }}"
        - component: "sensor" # === Command 4 : Configuration de la machine ===
          name: "type_caisson"
          config:
            state_topic: "CMD4"
            value_template: "{{ value_json.TYPCAI }}"
        - component: "sensor"
          name: "volume_a_ventiler"
          config:
            state_topic: "CMD4"
            value_template: "{{ value_json.VVENT }}"
            unit_of_measurement: "m³"
        - component: "sensor" # === Command 5 et 6 : État sondes internes ===
          name: "temperature_sonde0"
          config:
            state_topic: "CMD5"
            value_template: "{{ value_json.TEMP0 }}"
            unit_of_measurement: "°C"
        - component: "sensor"
          name: "humidite_sonde0"
          config:
            state_topic: "CMD5"
            value_template: "{{ value_json.HUM0 }}"
            unit_of_measurement: "%"
        - component: "sensor"
          name: "temperature_sonde3"
          config:
            state_topic: "CMD6"
            value_template: "{{ value_json.TEMP3 }}"
            unit_of_measurement: "°C"
        - component: "sensor" # === Command 7 : État options (bypass / HydroR) ===
          name: "ouverture_bypass1"
          config:
            state_topic: "CMD7"
            value_template: "{{ value_json.OUVBY1 }}"
            unit_of_measurement: "%"
        - component: "sensor"
          name: "ouverture_vanne_hydror"
          config:
            state_topic: "CMD7"
            value_template: "{{ value_json.OUVHYDR }}"
            unit_of_measurement: "%"
        - component: "sensor" # === Command 8 : Capteurs appairés ===
          name: "id_capteur"
          config:
            state_topic: "CMD8"
            value_template: "{{ value_json.IDAPP }}"
        - component: "sensor"
          name: "piece_capteur"
          config:
            state_topic: "CMD8"
            value_template: "{{ value_json.PIECEAPP }}"
        - component: "sensor"
          name: "profil_capteur"
          config:
            state_topic: "CMD8"
            value_template: "{{ value_json.PROFAPP }}"
